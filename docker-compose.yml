version: '3.8'

services:
  frontend:
    build:
      context: .
      args:
        VITE_AUTH_SERVICE_URL: ${VITE_AUTH_SERVICE_URL:-http://identity-service:5132}
        VITE_CATALOG_SERVICE_URL: ${VITE_CATALOG_SERVICE_URL:-http://catalog-service:3002}
    image: biblioteca-frontend:latest
    ports:
      - '4173:80'
    environment:
      VITE_AUTH_SERVICE_URL: ${VITE_AUTH_SERVICE_URL:-http://identity-service:5132}
      VITE_CATALOG_SERVICE_URL: ${VITE_CATALOG_SERVICE_URL:-http://catalog-service:3002}
    restart: unless-stopped
